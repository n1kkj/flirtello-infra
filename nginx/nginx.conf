worker_processes auto;
# CONF_VERSION: 2026-04-09-bi-proxy-fix

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  upstream backend_api {
    server backend:8000;
  }

  upstream mkt_api {
    server mkt-collector:8001;
  }

  upstream chats_ui {
    server chats:8502;
  }

  server {
    listen 80;
    server_name _;

    location = /api {
      return 301 /api/;
    }

    location = /api/ {
      return 302 /api/docs;
    }

    location = /api/docs {
      proxy_pass http://backend_api/docs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Accept-Encoding "";
      sub_filter_once off;
      sub_filter '"/openapi.json"' '"/api/openapi.json"';
      sub_filter "'/openapi.json'" "'/api/openapi.json'";
    }

    location ^~ /api/ {
      proxy_pass http://backend_api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /mkt {
      return 301 /mkt/;
    }

    location = /mkt/docs {
      proxy_pass http://mkt_api/docs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Accept-Encoding "";
      sub_filter_once off;
      sub_filter '"/openapi.json"' '"/mkt/openapi.json"';
      sub_filter "'/openapi.json'" "'/mkt/openapi.json'";
    }

    location ^~ /mkt/ {
      proxy_pass http://mkt_api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /chats {
      return 301 /chats/;
    }

    location ^~ /chats/ {
      proxy_pass http://chats_ui/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /bi {
      return 301 /bi/;
    }

    # BI отдаем на отдельный порт, чтобы исключить проблемы с абсолютными SPA-путями.
    location ^~ /bi/ {
      return 302 $scheme://$host:8083/;
    }

    location / {
      return 302 https://dt3lboegqhuu2.cloudfront.net$request_uri;
    }
  }

}
